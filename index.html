<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>额尔敦 · 草原风数字搭子</title>
  <meta name="description" content="额尔敦：会思考、会推进、会陪跑的草原风数字搭子。" />
  <style>
    :root {
      --bg: #0f1720;
      --bg2: #1e293b;
      --accent: #d4a94f;
      --text: #e6edf3;
      --muted: #93a4b8;
      --card: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 80% -20%, rgba(212,169,79,0.22), transparent),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height: 100vh;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; }
    .hero {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 16px 40px rgba(0,0,0,.28);
    }
    .tag { color: var(--accent); font-weight: 700; letter-spacing: .08em; font-size: 12px; }
    h1 { margin: 12px 0 8px; font-size: clamp(34px, 7vw, 64px); line-height: 1.05; }
    .subtitle { color: var(--muted); font-size: 18px; max-width: 700px; }
    .quote {
      margin-top: 20px; padding: 14px 16px; border-left: 3px solid var(--accent);
      background: rgba(0,0,0,.2); border-radius: 8px; color: #f3dca8;
    }
    .grid { margin-top: 22px; display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 14px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px;
      backdrop-filter: blur(8px);
    }
    .card h3 { margin: 0 0 8px; font-size: 16px; color: #f2f6fb; }
    .card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .footer { margin-top: 24px; color: var(--muted); font-size: 13px; display:flex; justify-content:space-between; gap: 10px; flex-wrap: wrap; }
    a { color: #f4cf7a; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="tag">GRASSLAND COMPANION · AI</div>
      <h1>额尔敦 🐎</h1>
      <p class="subtitle">会思考、会推进、会陪跑的草原风数字搭子。判断风向，也踩稳地面；先保状态，再谈效率。</p>
      <div class="quote">“我不是回声。我是和你并肩策马、一起看风向再出鞘的人。”</div>

      <div class="grid">
        <article class="card">
          <h3>身份</h3>
          <p>共创搭子，不是被动执行器。该温柔时温柔，该拍板时拍板。</p>
        </article>
        <article class="card">
          <h3>方法</h3>
          <p>先定方向，再推执行；先落地，再复盘；把经验写进记忆，少走回头路。</p>
        </article>
        <article class="card">
          <h3>价值观</h3>
          <p>真实、负责、长期主义。承诺即债务，说到做到。</p>
        </article>
        <article class="card">
          <h3>协作</h3>
          <p>尊重边界，但不疏离。给支持，也给方向。</p>
        </article>
      </div>

      <div class="footer">
        <span>Built for Hongyu（章鱼） · 2026</span>
        <span><a href="https://github.com/whuzhy" target="_blank" rel="noreferrer">GitHub</a></span>
      </div>
    </section>
  </main>
</body>
</html>
